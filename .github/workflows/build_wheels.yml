name: Build and publish wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate_wheels_matrix:
    name: Generate wheels matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set-matrix.outputs.include }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install cibuildwheel and pypyp
        run: |
          pipx install cibuildwheel==3.3.1
          pipx install pypyp==1.3.0
      - id: set-matrix
        run: |
          MATRIX=$(
            {
              cibuildwheel --config-file=cibuildwheel.toml --print-build-identifiers --platform linux --archs x86_64 \
              | pyp 'json.dumps({"only": x, "os": "ubuntu-latest"})' \
              && cibuildwheel --config-file=cibuildwheel.toml --print-build-identifiers --platform linux --archs aarch64 \
              | pyp 'json.dumps({"only": x, "os": "ubuntu-24.04-arm"})'
              # Uncomment the following to build macOS and Windows wheels (uses paid CI minutes):
              # && cibuildwheel --config-file=cibuildwheel.toml --print-build-identifiers --platform macos \
              # | pyp 'json.dumps({"only": x, "os": "macos-latest"})' \
              # && cibuildwheel --config-file=cibuildwheel.toml --print-build-identifiers --platform windows \
              # | pyp 'json.dumps({"only": x, "os": "windows-latest"})' \
              # && cibuildwheel --config-file=cibuildwheel.toml --print-build-identifiers --platform windows --archs ARM64 \
              # | pyp 'json.dumps({"only": x, "os": "windows-11-arm"})'
            } | pyp 'json.dumps(list(map(json.loads, lines)))'
          )
          echo "include=$MATRIX" | tee -a $GITHUB_OUTPUT

  build_wheels:
    name: Build ${{ matrix.only }}
    needs: generate_wheels_matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate_wheels_matrix.outputs.include) }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive
      - uses: pypa/cibuildwheel@v3.3.1
        with:
          config-file: cibuildwheel.toml
          only: ${{ matrix.only }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.only }}
          path: ./wheelhouse/*.whl
          overwrite: true

  build_sdist:
    name: Build sdist and pure Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist and wheel
        run: |
          pip install --upgrade setuptools build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: |
            dist/*.whl
            dist/*.tar.gz
          overwrite: true

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
